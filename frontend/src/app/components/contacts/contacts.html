<div class="header-action">
  <div class="flex items-center">
    <a routerLink="/categories" class="btn btn-secondary btn-sm mr-3"><i class="fas fa-arrow-left"></i> Back</a>
    <h2>Contacts for Category</h2>
  </div>
  <button class="btn btn-primary" (click)="toggleAddForm()">
    <i class="fas fa-user-plus"></i> Add Contact
  </button>
</div>

<div class="card add-form" *ngIf="showAddForm">
  <h3>{{ editMode ? 'Edit Contact' : 'Add New Contact' }}</h3>
  <form (ngSubmit)="saveContact()" #contactForm="ngForm">
    <div class="form-row">
      <div class="form-group half-width">
        <label>Name</label>
        <input type="text" name="name" [(ngModel)]="currentContact.name" placeholder="John Doe">
      </div>
      <div class="form-group half-width">
        <label>Phone Number *</label>
        <input type="text" name="phone" [(ngModel)]="currentContact.phone" required placeholder="Include country code, e.g. 919876543210">
      </div>
    </div>
    <div class="actions">
      <button type="submit" class="btn btn-primary" [disabled]="!currentContact.phone">Save</button>
      <button type="button" class="btn btn-secondary ml-2" (click)="toggleAddForm()">Cancel</button>
    </div>
  </form>
</div>

<div class="card mt-4 p-0">
  <table class="data-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Phone Number</th>
        <th>Added On</th>
        <th class="text-right">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let contact of contacts">
        <td>{{ contact.name || '-' }}</td>
        <td class="font-mono">{{ contact.phone }}</td>
        <td>{{ contact.createdAt | date:'shortDate' }}</td>
        <td class="text-right">
          <button class="icon-btn edit" (click)="editContact(contact)" title="Edit">
            <i class="fas fa-pen"></i>
          </button>
          <button class="icon-btn delete ml-2" (click)="deleteContact(contact._id)" title="Delete">
            <i class="fas fa-trash"></i>
          </button>
        </td>
      </tr>
      <tr *ngIf="contacts.length === 0">
        <td colspan="4" class="text-center py-4 text-muted">No contacts found in this category.</td>
      </tr>
    </tbody>
  </table>
</div>
